<!DOCTYPE html>
<html dir="rtl" lang="he">
<head>
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-SF4RWN0R10"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-SF4RWN0R10');
    </script>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>IsraMaster - אתגר גאוגרפיה יומי</title>
    
    <link rel="icon" type="image/png" href="favicon.png">
    <meta name="theme-color" content="#1a2a6c">

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        :root {
            --primary: #1a2a6c;
            --accent: #f44336;
            --gold: #ffeb3b;
            --success: #2ecc71;
            --dark: #2c3e50;
            --sidebar-width: 400px;
        }

        body, html { margin: 0; padding: 0; height: 100%; width: 100%; font-family: 'Segoe UI', system-ui, sans-serif; overflow: hidden; background: #eee; }
        body { display: flex; flex-direction: row; }

        #sidebar { 
            width: var(--sidebar-width); height: 100vh; background: var(--dark); 
            box-shadow: 5px 0 15px rgba(0,0,0,0.2); padding: 20px; 
            box-sizing: border-box; z-index: 2100; overflow-y: auto; 
            display: flex; flex-direction: column; color: white;
            transition: transform 0.3s ease-out;
        }

        #map { flex: 1; height: 100vh; background: #cad7d0; z-index: 1; }

        #mobile-toggle {
            display: none; position: fixed; bottom: 25px; left: 50%; transform: translateX(-50%);
            z-index: 2005; background: var(--dark); color: white; border: 2px solid var(--accent);
            padding: 12px 35px; border-radius: 30px; font-weight: bold; box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }

        .swipe-handle {
            display: none; width: 50px; height: 6px; background: rgba(255,255,255,0.3);
            border-radius: 10px; margin: -5px auto 15px auto; padding: 10px 0; background-clip: content-box;
        }

        .error-container { min-height: 60px; display: flex; align-items: center; justify-content: center; margin-bottom: 5px; }
        #errorMsg { 
            width: 100%; min-height: 45px; color: #fff; font-size: 14px; opacity: 0; 
            text-align: center; font-weight: bold; background: rgba(255, 255, 255, 0.05); 
            border: 1px solid rgba(255, 255, 255, 0.1); padding: 8px; border-radius: 12px;
            transition: all 0.3s ease; transform: translateY(5px);
            display: flex; flex-direction: column; justify-content: center; pointer-events: none;
        }
        #errorMsg.visible { opacity: 1; transform: translateY(0); background: rgba(244, 67, 54, 0.35); border-color: var(--accent); pointer-events: auto;}
        #errorMsg.suggestion-active { background: rgba(46, 204, 113, 0.2); border-color: var(--success); }
        .suggestion-link { text-decoration: none; color: var(--gold); display: inline-block; margin-top: 5px; cursor: pointer; padding: 3px 10px; background: rgba(255,255,255,0.1); border-radius: 6px; }

        .shake { animation: shake 0.4s both; border: 2px solid var(--accent) !important; }
        @keyframes shake { 10%, 90% { transform: translate3d(-1px, 0, 0); } 20%, 80% { transform: translate3d(2px, 0, 0); } 30%, 50%, 70% { transform: translate3d(-4px, 0, 0); } 40%, 60% { transform: translate3d(4px, 0, 0); } }

        .stats-card { text-align: center; margin-bottom: 10px; }
        .life-container { display: flex; justify-content: center; gap: 6px; margin-top: 5px; }
        .life-circle { width: 10px; height: 10px; background: var(--gold); border-radius: 50%; transition: 0.3s; }
        .life-circle.lost { background: rgba(255,255,255,0.1); transform: scale(0.7); box-shadow: none; }

        .btn-main { padding: 15px; background: var(--accent); color: white; border: none; border-radius: 15px; cursor: pointer; font-weight: bold; font-size: 16px; width: 100%; margin-top: 8px; }
        .btn-secondary { background: #555; margin-top: 5px; }
        input { padding: 15px; border: 2px solid rgba(255,255,255,0.2); border-radius:15px; background: rgba(255,255,255,0.1); font-size: 16px; color: white; width: 100%; box-sizing: border-box; outline: none; }

        .custom-marker { display: flex !important; flex-direction: column !important; align-items: center !important; justify-content: center !important; }
        .marker-dot { width: 12px; height: 12px; border-radius: 50%; border: 2px solid white; box-shadow: 0 0 8px rgba(0,0,0,0.5); z-index: 2; }
        .marker-bubble {
            background: white; color: #222; padding: 5px 10px; border-radius: 10px; font-size: 12px; font-weight: 900;
            white-space: nowrap; display: flex; flex-direction: column; align-items: center;
            box-shadow: 0 3px 10px rgba(0,0,0,0.2); border: 2px solid transparent; margin-bottom: 4px;
        }

        #setup-overlay, #how-to-play-overlay, #victory-overlay, #confirm-overlay { position: fixed; inset: 0; z-index: 3000; display: flex; flex-direction: column; justify-content: center; align-items: center; color: white; text-align: center; backdrop-filter: blur(8px); }
        #setup-overlay { background: radial-gradient(circle at center, #1a2a6c, #000); }
        #how-to-play-overlay, #confirm-overlay { background: rgba(0,0,0,0.85); display: none; }
        
        .modal { background: white; padding: 25px; border-radius: 25px; width: 85%; max-width: 350px; color: #333; box-shadow: 0 20px 40px rgba(0,0,0,0.4); }
        .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin: 20px 0; }
        .stat-val { font-size: 20px; font-weight: 900; color: var(--primary); display: block; }
        .stat-lbl { font-size: 11px; color: #777; }

        #feedback { flex: 1; overflow-y: auto; margin-top: 15px; display: flex; flex-direction: column; gap: 8px; padding-bottom: 20px;}
        .guess-row { padding: 12px; border-radius: 10px; display: flex; justify-content: space-between; align-items: center; font-weight: 800; color: #000; font-size: 14px; flex-shrink: 0; }

        @media (max-width: 850px) {
            #sidebar { position: fixed; bottom: 0; left: 0; width: 100%; height: 65vh; transform: translateY(100%); border-radius: 25px 25px 0 0; transition: transform 0.1s linear; }
            #sidebar.open { transform: translateY(0); }
            #sidebar.transitioning { transition: transform 0.4s cubic-bezier(0.2, 0, 0, 1); }
            .swipe-handle { display: block; }
            #mobile-toggle { display: block; }
        }
    </style>
</head>
<body>

<div id="setup-overlay">
    <div style="font-size: 45px; font-weight: 900; letter-spacing: 4px;">ISRAMASTER</div>
    <p style="margin-bottom: 30px; opacity: 0.8;">האתגר הגיאוגרפי היומי</p>
    <div style="width: 260px; display: flex; flex-direction: column; gap: 10px;">
        <button class="btn-main" onclick="startGame()">שחק עכשיו 🛰️</button>
        <button class="btn-main btn-secondary" onclick="toggleInstructions(true)">איך משחקים?</button>
    </div>
</div>

<div id="confirm-overlay">
    <div class="modal">
        <h3>האם לוותר על האתגר?</h3>
        <p>הפסד יירשם והמיקום ייחשף.</p>
        <button class="btn-main" onclick="endGame(false, attempts)">כן, לוותר 🏳️</button>
        <button class="btn-main btn-secondary" style="color:#333; border-color:#ccc" onclick="closeConfirm()">חזרה למשחק</button>
    </div>
</div>

<div id="how-to-play-overlay">
    <div class="modal">
        <h2 style="margin-top:0">איך משחקים?</h2>
        <ul style="text-align: right; line-height: 1.6; padding-right: 20px;">
            <li>נחשו את <b>היישוב המסתורי</b>.</li>
            <li>הצבע משתנה לפי המרחק (אדום = קרוב, צהוב = רחוק).</li>
            <li>החץ מראה את <b>הכיוון</b> ליישוב.</li>
            <li>יש לכם 10 ניסיונות.</li>
        </ul>
        <button class="btn-main" onclick="toggleInstructions(false)">הבנתי!</button>
    </div>
</div>

<button id="mobile-toggle" onclick="toggleSidebar(true)">הקש ניחוש 📊</button>

<div id="sidebar">
    <div class="swipe-handle" id="swipeHandle"></div>
    <div class="stats-card">
        <h3 style="margin:0; letter-spacing: 2px;">ISRAMASTER</h3>
        <div class="life-container" id="lifePoints"></div>
    </div>
    
    <div class="error-container">
        <div id="errorMsg"></div>
    </div>
    
    <input type="text" id="cityInput" placeholder="שם היישוב..." list="cityList" autocomplete="off" onkeypress="if(event.key === 'Enter') makeGuess()" oninput="clearErrorOnType()">
    <datalist id="cityList"></datalist>
    
    <div style="display: flex; gap: 10px; margin-top: 10px;">
        <button id="submitBtn" class="btn-main" style="margin-top:0; flex: 2;" onclick="makeGuess()">ניחוש 🚀</button>
        <button id="giveUpBtn" class="btn-main btn-secondary" style="margin-top:0; flex: 1;" onclick="showConfirm()">🏳️</button>
    </div>

    <div id="feedback"></div>
</div>

<div id="map"></div>

<div id="victory-overlay" style="display:none;">
    <div class="modal">
        <h2 id="vic-title"></h2>
        <p id="vic-msg"></p>
        <div class="stats-grid">
            <div class="stat-item"><span class="stat-val" id="st-played">0</span><span class="stat-lbl">משחקים</span></div>
            <div class="stat-item"><span class="stat-val" id="st-winpct">0%</span><span class="stat-lbl">ניצחונות</span></div>
            <div class="stat-item"><span class="stat-val" id="st-streak">0</span><span class="stat-lbl">רצף</span></div>
            <div class="stat-item"><span class="stat-val" id="st-avg">0</span><span class="stat-lbl">ממוצע</span></div>
        </div>
        <button class="btn-main" style="background: var(--dark);" onclick="hideOverlay()">סגור מפה</button>
    </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
let allCities = [];
let target;
let attempts = 10;
let isGameOver = false;
let errorTimeout;

// DOUBLE-FILTER CONFIGURATION
const approvedArabCities = ["אום אל-פחם", "באקה אל-גרבייה", "ג'לג'וליה", "נצרת", "סח'נין", "רהט", "שפרעם"];

// Keywords that indicate an Arab/Druze settlement to exclude
const excludeKeywords = ["כפר", "אבו", "עין", "דיר", "משהד", "מג'ד", "חורפיש", "בועיינה", "יאנוח", "ג'ת", "ירכא", "ראמה", "ג'ש", "ביר", "חמאם", "אחסם", "שעב", "דבוריה", "טורעאן", "כאבול", "זמר", "פוריידיס", "ג'סר", "ריינה", "עילוט", "מזרעה", "כסרא", "סמיע", "סאג'ור", "כסלון", "מוקייבלה", "שיבלי", "אום"];

// Safety net: Specific names that don't have keywords but are Arab/Druze settlements
const extraExclusions = ["פוריידיס", "איכסאל", "נחף", "כאוכב", "ג'לג'וליה", "כפר קאסם", "טירה", "טייבה", "קלנסווה", "ערערה", "חורפיש", "מזרעה", "בוקעאתא", "מג'דל שמס", "מסעדה", "עין קנייה", "לקיה", "תל שבע", "חורה", "כסייפה", "ערערה בנגב", "שגב שלום"];

const map = L.map('map', { zoomControl: false, attributionControl: false }).setView([31.5, 34.8], 8);
L.tileLayer('https://{s}.basemaps.cartocdn.com/light_nolabels/{z}/{x}/{y}{r}.png').addTo(map);

// SWIPE LOGIC
let touchStartY = 0;
let currentTranslateY = 0;
const sidebar = document.getElementById('sidebar');

sidebar.addEventListener('touchstart', e => {
    if (sidebar.scrollTop <= 0) {
        touchStartY = e.touches[0].clientY;
        sidebar.classList.remove('transitioning');
    }
}, {passive: true});

sidebar.addEventListener('touchmove', e => {
    if (sidebar.scrollTop <= 0) {
        const touchY = e.touches[0].clientY;
        const diff = touchY - touchStartY;
        if (diff > 0 && sidebar.classList.contains('open')) {
            sidebar.style.transform = `translateY(${diff}px)`;
            currentTranslateY = diff;
        }
    }
}, {passive: true});

sidebar.addEventListener('touchend', () => {
    sidebar.classList.add('transitioning');
    if (currentTranslateY > 150) {
        toggleSidebar(false);
    } else {
        sidebar.style.transform = '';
    }
    currentTranslateY = 0;
});

map.on('click', () => { if(window.innerWidth <= 850) toggleSidebar(false); });

function getDailyKey() {
    const d = new Date();
    // Daily key change ensures stats logic is partitioned by day
    return `v7-${d.getFullYear()}-${d.getMonth() + 1}-${d.getDate()}`;
}

async function loadData() {
    try {
        const response = await fetch('MapIsrael.geojson');
        const data = await response.json();
        
        allCities = data.features.map(f => ({
            name: (f.properties["name:he"] || f.properties["name"] || "").trim(),
            lat: f.geometry.coordinates[1],
            lon: f.geometry.coordinates[0]
        })).filter(c => c.name !== "");

        // --- THE "FOR SURE" FILTER ---
        const validTargets = allCities.filter(city => {
            // Check if explicitly approved
            if (approvedArabCities.includes(city.name)) return true;
            
            // Check if it's on the exclusion list or safety net
            const isExcludedByKeyword = excludeKeywords.some(kw => city.name.includes(kw));
            const isExcludedByName = extraExclusions.includes(city.name);
            
            // If it hits either exclusion list, it is BLOCKED as a target
            return !(isExcludedByKeyword || isExcludedByName);
        });

        const seedStr = getDailyKey();
        let hash = 0;
        for (let i = 0; i < seedStr.length; i++) hash = ((hash << 5) - hash) + seedStr.charCodeAt(i);
        const seededRandom = Math.abs(Math.sin(hash));
        
        // Target is pulled ONLY from the bulletproof list
        target = validTargets[Math.floor(seededRandom * validTargets.length)];

        // LIFE POINTS
        const container = document.getElementById('lifePoints');
        container.innerHTML = '';
        for(let i=0; i<10; i++) {
            const div = document.createElement('div');
            div.className = 'life-circle';
            div.id = `life-${9-i}`;
            container.appendChild(div);
        }
        
        const dl = document.getElementById('cityList');
        [...new Set(allCities.map(c => c.name))].sort().forEach(name => {
            let o = document.createElement('option'); o.value = name; dl.appendChild(o);
        });

        restoreGameState();
    } catch (e) { console.error("Error loading data", e); }
}

function restoreGameState() {
    const stats = JSON.parse(localStorage.getItem('israeleStats')) || { history: {} };
    const today = getDailyKey();
    if (stats.history && stats.history[today]) {
        const todayData = stats.history[today];
        document.getElementById('setup-overlay').style.display = 'none';
        todayData.guessesToday.forEach(cityName => processGuess(cityName, true));
        if (todayData.isGameOverToday) endGame(todayData.lastResultWasWin, todayData.lastAttemptsCount, true);
    }
}

function getLevenshteinDistance(a, b) {
    const matrix = [];
    for (let i = 0; i <= b.length; i++) matrix[i] = [i];
    for (let j = 0; j <= a.length; j++) matrix[0][j] = j;
    for (let i = 1; i <= b.length; i++) {
        for (let j = 1; j <= a.length; j++) {
            if (b.charAt(i - 1) === a.charAt(j - 1)) matrix[i][j] = matrix[i - 1][j - 1];
            else matrix[i][j] = Math.min(matrix[i - 1][j - 1] + 1, matrix[i][j - 1] + 1, matrix[i - 1][j] + 1);
        }
    }
    return matrix[b.length][a.length];
}

function clearErrorOnType() {
    const errorDiv = document.getElementById('errorMsg');
    if (errorDiv.classList.contains('visible')) {
        errorDiv.classList.remove('visible');
    }
}

function makeGuess() {
    const input = document.getElementById('cityInput');
    const val = input.value.trim();
    const errorDiv = document.getElementById('errorMsg');
    if (!val || isGameOver) return;
    
    const guess = allCities.find(c => c.name === val);
    
    if (!guess) {
        clearTimeout(errorTimeout);
        input.classList.add('shake');
        setTimeout(() => input.classList.remove('shake'), 400);

        let bestMatch = null;
        for (let city of allCities) {
            if (getLevenshteinDistance(val, city.name) <= 2) { bestMatch = city.name; break; }
        }

        errorDiv.classList.add('visible');
        errorDiv.classList.remove('suggestion-active');

        if (bestMatch) {
            errorDiv.classList.add('suggestion-active');
            errorDiv.innerHTML = `האם התכוונת ל:<br><span class="suggestion-link" onclick="applySuggestion('${bestMatch}')">${bestMatch}?</span>`;
        } else {
            errorDiv.innerHTML = `היישוב לא מופיע במאגר ❌`;
            errorTimeout = setTimeout(() => { errorDiv.classList.remove('visible'); }, 4000);
        }
        return;
    }
    
    errorDiv.classList.remove('visible');
    processGuess(val);
    input.value = "";
}

function applySuggestion(name) {
    document.getElementById('cityInput').value = name;
    document.getElementById('errorMsg').classList.remove('visible');
    makeGuess();
}

function processGuess(cityName, isRestoring = false) {
    let guess = allCities.find(c => c.name === cityName);
    if (!guess) return;

    attempts--;
    const lifeCircle = document.getElementById(`life-${attempts}`);
    if(lifeCircle) lifeCircle.classList.add('lost');

    const dist = calculateDistance(guess.lat, guess.lon, target.lat, target.lon);
    const bearing = (Math.atan2(target.lon - guess.lon, target.lat - guess.lat) * 180 / Math.PI + 360) % 360;
    const ratio = Math.pow(Math.min(dist / 150, 1), 0.35);
    const color = `rgb(255, ${Math.floor(255 * ratio)}, ${Math.floor(100 * ratio)})`;

    const icon = L.divIcon({
        className: 'custom-marker',
        html: `<div class="marker-bubble" style="border-color:${color}"><div>${guess.name}</div><div style="font-size:10px">${dist.toFixed(1)} ק"מ <span style="display:inline-block; transform:rotate(${bearing}deg)">⬆️</span></div></div><div class="marker-dot" style="background-color:${color}"></div>`,
        iconSize: [0, 0], iconAnchor: [0, 40]
    });
    L.marker([guess.lat, guess.lon], { icon: icon }).addTo(map);
    
    const row = document.createElement('div');
    row.className = 'guess-row';
    row.style.background = color;
    row.innerHTML = `<span>${guess.name}</span> <span>${dist.toFixed(1)} ק"מ <span style="display:inline-block; transform:rotate(${bearing}deg)">⬆️</span></span>`;
    document.getElementById('feedback').prepend(row);

    if (!isRestoring) {
        saveProgress(cityName);
        map.flyTo([guess.lat, guess.lon], 10);
    }

    if (cityName === target.name) endGame(true, attempts, isRestoring);
    else if (attempts === 0) endGame(false, attempts, isRestoring);
}

function saveProgress(cityName) {
    let stats = JSON.parse(localStorage.getItem('israeleStats')) || { played:0, wins:0, streak:0, totalGuesses:0, history: {} };
    const today = getDailyKey();
    if (!stats.history) stats.history = {};
    if (!stats.history[today]) stats.history[today] = { guessesToday: [], isGameOverToday: false };
    
    stats.history[today].guessesToday.push(cityName);
    localStorage.setItem('israeleStats', JSON.stringify(stats));
}

function calculateDistance(lat1, lon1, lat2, lon2) {
    const R = 6371;
    const dLat = (lat2-lat1)*Math.PI/180;
    const dLon = (lon2-lon1)*Math.PI/180;
    const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLon/2)**2;
    return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}

function endGame(win, remaining, alreadyProcessed = false) {
    isGameOver = true;
    closeConfirm();
    document.getElementById('cityInput').disabled = true;
    document.getElementById('submitBtn').disabled = true;

    let stats = JSON.parse(localStorage.getItem('israeleStats')) || { played:0, wins:0, streak:0, totalGuesses:0, history: {} };
    const today = getDailyKey();

    if (!stats.history[today]) stats.history[today] = { guessesToday: [], isGameOverToday: false };
    
    if (!alreadyProcessed && !stats.history[today].isGameOverToday) {
        stats.played = (stats.played || 0) + 1;
        stats.history[today].isGameOverToday = true;
        stats.history[today].lastResultWasWin = win;
        stats.history[today].lastAttemptsCount = remaining;
        if(win) { 
            stats.wins = (stats.wins || 0) + 1; 
            stats.streak = (stats.streak || 0) + 1; 
            stats.totalGuesses = (stats.totalGuesses || 0) + (10 - remaining); 
        } else { stats.streak = 0; }
        localStorage.setItem('israeleStats', JSON.stringify(stats));
    }
    
    document.getElementById('st-played').innerText = stats.played || 0;
    document.getElementById('st-winpct').innerText = stats.played > 0 ? Math.round(((stats.wins || 0) / stats.played) * 100) + "%" : "0%";
    document.getElementById('st-streak').innerText = stats.streak || 0;
    document.getElementById('st-avg').innerText = stats.wins > 0 ? ((stats.totalGuesses || 0) / stats.wins).toFixed(1) : "0";
    
    document.getElementById('victory-overlay').style.display = 'flex';
    document.getElementById('vic-title').innerText = win ? "פגיעה בול! 🎯" : "נגמרו הניסיונות 🚩";
    document.getElementById('vic-msg').innerText = `היעד היה: ${target.name}`;
    
    L.marker([target.lat, target.lon]).addTo(map).bindPopup(`<b>${target.name}</b>`).openPopup();
    if (!alreadyProcessed) map.flyTo([target.lat, target.lon], 12);
}

function toggleSidebar(forceOpen) {
    sidebar.classList.add('transitioning');
    sidebar.style.transform = '';
    if (forceOpen === true) sidebar.classList.add('open');
    else if (forceOpen === false) sidebar.classList.remove('open');
    else sidebar.classList.toggle('open');
}

function startGame() { document.getElementById('setup-overlay').style.display = 'none'; }
function toggleInstructions(show) { document.getElementById('how-to-play-overlay').style.display = show ? 'flex' : 'none'; }
function hideOverlay() { document.getElementById('victory-overlay').style.display = 'none'; }
function showConfirm() { if(!isGameOver) document.getElementById('confirm-overlay').style.display = 'flex'; }
function closeConfirm() { document.getElementById('confirm-overlay').style.display = 'none'; }

window.onload = loadData;
</script>
</body>
</html>
